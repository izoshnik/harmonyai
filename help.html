<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HarmonyAi — Помощь</title>
<style>
  :root{
    --bg:#ffffff;
    --text:#000000;
    --muted:#999999;
    --dark-gray:#333333;
    --pill:#f0f0f2;
    --border:#e5e5e5;
    --divider:#eeeeee;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:28px 22px 80px;
  }
  /* Header */
  .top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .logo{
    font-size:40px;
    font-weight:800;
    letter-spacing:-0.5px;
    color:var(--text);
  }
  .lang-wrap{position:relative;}
  .lang-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--pill);
    border:none;
    border-radius:999px;
    padding:10px 16px;
    font-size:16px;
    font-weight:500;
    color:var(--text);
    cursor:pointer;
    font-family:inherit;
    white-space:nowrap;
  }
  .lang-btn svg{width:18px;height:18px;}
  .lang-menu{
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:0 8px 30px rgba(0,0,0,.10);
    padding:6px;
    min-width:170px;
    z-index:20;
    display:none;
  }
  .lang-menu.open{display:block;}
  .lang-menu button{
    display:block;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    padding:11px 14px;
    font-size:16px;
    color:var(--text);
    border-radius:9px;
    cursor:pointer;
    font-family:inherit;
  }
  .lang-menu button:hover{background:var(--pill);}
  .lang-menu button[aria-selected="true"]{font-weight:700;}
  /* Search */
  .search{
    margin-top:34px;
  }
  .search-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:4px 2px 14px;
  }
  .search-row svg{width:24px;height:24px;flex:none;color:#111;}
  .search-row input{
    border:none;
    outline:none;
    font-size:20px;
    width:100%;
    background:transparent;
    color:var(--text);
    font-family:inherit;
  }
  .search-row input::placeholder{color:var(--muted);}
  .search-divider{
    height:2px;
    background:#000;
    width:100%;
    border:none;
  }
  /* Site card */
  .site{
    display:flex;
    align-items:center;
    gap:22px;
    margin-top:48px;
  }
  .site-icon{
    width:110px;height:110px;
    flex:none;
    background:#000;
    border-radius:24px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .site-icon span{
    font-size:70px;
    font-weight:800;
    line-height:1;
    background:linear-gradient(180deg,#ffffff 0%,#999999 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    color:#fff;
  }
  .site-text .t1{font-size:44px;font-weight:800;line-height:1.05;color:#000;}
  .site-text .t2{font-size:44px;font-weight:400;line-height:1.05;color:var(--dark-gray);}
  .site-text .t3{font-size:20px;color:var(--muted);margin-top:8px;}
  /* FAQ list */
  .faq{
    margin-top:44px;
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
  }
  .item{border-bottom:1px solid var(--divider);}
  .item:last-child{border-bottom:none;}
  .item.hidden{display:none;}
  .q{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    width:100%;
    background:none;
    border:none;
    text-align:left;
    padding:20px 20px;
    font-size:22px;
    font-weight:500;
    color:#000;
    cursor:pointer;
    font-family:inherit;
  }
  .q .chev{
    flex:none;
    width:20px;height:20px;
    color:var(--muted);
    transition:transform .28s ease;
  }
  .item.open .q .chev{transform:rotate(90deg);}
  .a-wrap{
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows .32s ease;
  }
  .item.open .a-wrap{grid-template-rows:1fr;}
  .a-inner{overflow:hidden;}
  .a{
    padding:0 20px 22px;
    font-size:18px;
    color:var(--dark-gray);
    line-height:1.6;
  }
  .a a{color:#0a58ca;word-break:break-all;}
  .empty{
    padding:26px 20px;
    color:var(--muted);
    font-size:18px;
    text-align:center;
    display:none;
  }
  .empty.show{display:block;}
  @media (max-width:560px){
    .logo{font-size:32px;}
    .site-icon{width:88px;height:88px;border-radius:20px;}
    .site-icon span{font-size:56px;}
    .site-text .t1,.site-text .t2{font-size:34px;}
    .site-text .t3{font-size:16px;}
    .q{font-size:19px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">HarmonyAi</div>
    <div class="lang-wrap">
      <button class="lang-btn" id="langBtn" aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"/></svg>
        <span id="langLabel">Русский</span>
      </button>
      <div class="lang-menu" id="langMenu" role="menu"></div>

  <div class="search">
    <div class="search-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
      <input type="text" id="searchInput" placeholder="Поиск статей...">

    <hr class="search-divider">

  <div class="site">
    <div class="site-icon"><span>H</span></div>
    <div class="site-text">
      <div class="t1" id="siteTitle">Сайт</div>
      <div class="t2">HarmonyAi</div>
      <div class="t3" id="siteSub">Частые вопросы о сайте HarmonyAi</div>
    </div>
  </div>

  <div class="faq" id="faqList"></div>
  <div class="empty" id="emptyMsg">Ничего не найдено</div>
</div>

<script>
/* ---- UI chrome translations (FAQ Q&A stay in Russian; FAQ translations can be added later) ---- */
var I18N = {
  ru:{name:"Русский", search:"Поиск статей...", site:"Сайт", sub:"Частые вопросы о сайте HarmonyAi", empty:"Ничего не найдено"},
  en:{name:"English", search:"Search articles...", site:"Site", sub:"Frequently asked questions about HarmonyAi", empty:"Nothing found"},
  fr:{name:"Français", search:"Rechercher des articles...", site:"Site", sub:"Questions fréquentes sur HarmonyAi", empty:"Aucun résultat"},
  de:{name:"Deutsch", search:"Artikel suchen...", site:"Seite", sub:"Häufige Fragen zu HarmonyAi", empty:"Nichts gefunden"},
  es:{name:"Español", search:"Buscar artículos...", site:"Sitio", sub:"Preguntas frecuentes sobre HarmonyAi", empty:"No se encontró nada"}
};
var LANG_ORDER = ["ru","en","fr","de","es"];

/* ---- FAQ data (Russian only) ---- */
var FAQ = [
  ["Что такое HarmonyAI?","HarmonyAI - это искусственный интеллект, разработанный специально для учеников музыкальных школ. В отличие от обычных универсальных помощников, он обучен не только на общедоступных данных, но и на нескольких сотнях учебников, методических пособий и практических заданий по сольфеджио, музыкальной грамоте, теории музыки, гармонии и музыкальной литературе. Благодаря этому сервис лучше понимает музыкальные термины, умеет объяснять темы простым языком и помогает готовиться к урокам, контрольным работам, экзаменам и вступительным испытаниям. При этом HarmonyAI сохраняет все привычные возможности современного искусственного интеллекта: отвечает на вопросы, пишет тексты, анализирует информацию, помогает с учебой и выполняет множество других задач."],
  ["Чем HarmonyAI отличается от других искусственных интеллектов?","Большинство сервисов искусственного интеллекта являются универсальными помощниками и не имеют глубоких знаний в области музыкального образования. HarmonyAI был создан именно для учеников музыкальных школ. Он понимает программу обучения, музыкальные термины, особенности нотной записи и способен объяснять сложные темы значительно понятнее. Кроме того, сервис умеет распознавать музыкальные произведения, работать с нотными диктантами и постепенно получает новые специализированные функции, которых нет у большинства аналогов."],
  ["Что умеет HarmonyAI?","HarmonyAI способен отвечать на вопросы практически по любой теме, объяснять учебный материал, помогать выполнять домашние задания, анализировать изображения, читать документы, создавать изображения по текстовому описанию, распознавать музыкальные произведения, анализировать нотные диктанты, помогать с музыкальной теорией, сольфеджио, гармонией и музыкальной литературой. Искусственный интеллект также умеет переводить тексты, помогать с программированием, искать ошибки и объяснять свои ответы простым языком."],
  ["Может ли HarmonyAI читать файлы?","Да. HarmonyAI поддерживает работу с различными документами и текстовыми файлами. После загрузки файла искусственный интеллект может проанализировать его содержимое, ответить на вопросы, сделать краткое содержание, объяснить сложные темы или помочь найти нужную информацию."],
  ["Для кого предназначен HarmonyAI?","HarmonyAI разработан в первую очередь для учеников музыкальных школ, однако пользоваться сервисом могут также преподаватели, родители и все, кто изучает музыку самостоятельно. Он подходит как начинающим музыкантам, так и учащимся старших классов, помогая быстрее понимать сложные темы и экономить время при подготовке к занятиям."],
  ["Можно ли пользоваться бесплатно?","Да. HarmonyAI имеет полностью бесплатный тариф, позволяющий познакомиться с основными возможностями сервиса. Однако бесплатная версия имеет ежедневные лимиты и некоторые ограничения функций. Если лимитов недостаточно или требуется доступ ко всем возможностям платформы, можно оформить Pro-подписку и пользоваться сервисом без ограничений."],
  ["Нужна ли регистрация?","Да. Для использования HarmonyAI необходимо зарегистрироваться при помощи электронной почты. Вместо обычного пароля используется безопасный вход по одноразовому коду подтверждения, который приходит на электронную почту. Это упрощает авторизацию и снижает риск потери пароля."],
  ["Какие языки поддерживаются?","На данный момент HarmonyAI поддерживает русский, английский, немецкий, испанский и французский языки. Список поддерживаемых языков будет постепенно расширяться по мере развития проекта."],
  ["Какие модели использует HarmonyAI?","Бесплатный тариф использует модель Adanatos. Она подходит для большинства повседневных задач, но некоторые функции сервиса недоступны. Подписка Pro открывает доступ к модели Dynatos --- самой мощной модели HarmonyAI. Она обеспечивает более качественные ответы, лучшие рассуждения, улучшенную генерацию изображений, доступ к распознаванию музыки и всем новым возможностям сервиса сразу после их появления."],
  ["Может ли HarmonyAI искать информацию в интернете?","Да. При необходимости HarmonyAI может искать актуальную информацию в интернете и использовать ее при подготовке ответа. Это особенно полезно для поиска свежих новостей, изменений в законодательстве, расписаний, цен и другой информации, которая регулярно обновляется. Если поиск не требуется, искусственный интеллект отвечает на основе собственных знаний."],
  ["Может ли HarmonyAI анализировать документы?","Да. HarmonyAI умеет работать с документами различных форматов. Вы можете загрузить файл, после чего искусственный интеллект сможет прочитать его содержимое, объяснить непонятные моменты, сделать краткое содержание, ответить на вопросы по тексту или помочь найти нужную информацию."],
  ["Может ли HarmonyAI генерировать изображения?","Да. HarmonyAI умеет создавать изображения по текстовому описанию. Вы можете подробно описать желаемый результат, а искусственный интеллект сгенерирует изображение на основе вашего запроса. Чем подробнее описание, тем точнее обычно получается результат."],
  ["Может ли HarmonyAI распознавать изображения?","Да. HarmonyAI способен анализировать загруженные изображения. Он может описывать содержимое фотографии, распознавать объекты, читать текст, помогать с решением заданий по изображениям и отвечать на вопросы по содержимому картинки."],
  ["Как работает распознавание музыки?","Пользователь загружает аудиофайл, после чего HarmonyAI анализирует его содержимое. Если это музыкальное произведение, искусственный интеллект определяет его название, композитора, исполнителя и предоставляет дополнительную информацию о произведении. Если загружен нотный диктант, HarmonyAI распознает услышанные ноты и старается построить нотную запись, максимально соответствующую оригиналу."],
  ["Какие форматы аудио поддерживаются?","HarmonyAI поддерживает большинство популярных аудиоформатов, используемых на современных устройствах. Вы можете загрузить запись, сделанную на телефон, диктофон, компьютер или скачанную из другого источника. Если файл воспроизводится на вашем устройстве и имеет распространенный формат, скорее всего сервис сможет его обработать. Для достижения максимально точного результата рекомендуется использовать запись без сильных шумов, помех и посторонних звуков."],
  ["Какой максимальной длины может быть запись?","Максимальная продолжительность одного аудиофайла составляет 5 минут. Такое ограничение позволяет сохранить высокую скорость обработки и качество анализа. В большинстве случаев этого времени достаточно для распознавания музыкального произведения или анализа нотного диктанта. В будущем максимальная длительность может быть увеличена."],
  ["Может ли HarmonyAI распознавать классическую музыку?","Да. HarmonyAI способен распознавать классические произведения различных эпох и композиторов. В отличие от обычных сервисов распознавания музыки, он старается не только определить название произведения, но и предоставить дополнительную информацию об авторе, истории создания и особенностях произведения. Следует учитывать, что это не специализированный сервис вроде Shazam, поэтому иногда точность определения может быть ниже, особенно при плохом качестве записи."],
  ["Может ли HarmonyAI определить автора и исполнителя?","Да. Если музыкальное произведение успешно распознано, искусственный интеллект по возможности укажет композитора, название произведения, исполнителя, а также другую доступную информацию. Объем информации зависит от конкретной записи и доступных данных."],
  ["Насколько точны результаты распознавания?","Точность напрямую зависит от качества загруженного аудио. Если запись чистая, без сильных шумов и искажений, а произведение является достаточно известным, вероятность правильного определения очень высокая. При редких произведениях, концертных записях или плохом качестве звука возможны неточности. Именно поэтому рекомендуется использовать максимально качественные записи."],
  ["Может ли HarmonyAI определить аккорды?","Да. HarmonyAI способен анализировать музыкальный материал и определять аккорды во многих случаях. Однако сложные джазовые гармонии, нестандартные аранжировки или записи с большим количеством инструментов могут снижать точность анализа. По мере развития проекта качество определения будет улучшаться."],
  ["Может ли HarmonyAI преобразовать музыку в полноценные ноты?","Пока нет. Это одна из самых сложных функций, над которой ведется работа. На сегодняшний день HarmonyAI умеет распознавать нотные диктанты, однако полноценное автоматическое преобразование любого музыкального произведения в профессиональную нотную запись пока находится в разработке. В будущем данная возможность обязательно появится."],
  ["Что входит в Pro-подписку?","Pro-подписка предоставляет доступ ко всем возможностям HarmonyAI без ограничений. Пользователи получают доступ к модели Dynatos, более качественной генерации изображений, функции распознавания музыки, отсутствию лимитов на использование сервиса, а также к новым функциям сразу после их официального выпуска. Кроме того, именно пользователи Pro первыми получают доступ к наиболее современным технологиям платформы."],
  ["Чем бесплатная версия отличается от Pro?","Бесплатная версия позволяет познакомиться с основными возможностями HarmonyAI, однако имеет ряд ограничений. Используется менее мощная модель Adanatos, отсутствует распознавание музыки, генерация изображений имеет более низкое качество, а также действуют лимиты на использование. Pro-подписка снимает все эти ограничения и открывает полный функционал сервиса."],
  ["Есть ли ограничения в бесплатной версии?","Да. Бесплатная версия HarmonyAI имеет ограничения по количеству запросов и некоторым функциям сервиса. Такие ограничения позволяют обеспечить стабильную работу платформы для всех пользователей. Если вам требуется постоянный доступ без лимитов, рекомендуется оформить Pro-подписку."],
  ["Как оформить подписку?","Для оформления подписки откройте раздел «Настройки» и выберите пункт «Обновить подписку». Также оформить Pro можно на официальном сайте: <a href=\"https://harmonyai-zeta.vercel.app/subscribe\">https://harmonyai-zeta.vercel.app/subscribe</a>. После успешной оплаты подписка автоматически активируется для вашего аккаунта."],
  ["Как отменить подписку?","Если вы хотите отменить подписку, необходимо обратиться в службу поддержки. Специалисты помогут отключить автоматическое продление и ответят на все вопросы, связанные с подпиской. Ссылка на поддержку будет добавлена позднее."],
  ["Можно ли вернуть деньги за подписку?","Нет. После успешной оплаты стоимость подписки не возвращается. Перед оформлением рекомендуется внимательно ознакомиться с возможностями выбранного тарифа. Если во время оплаты произошел технический сбой, необходимо обратиться в службу поддержки для индивидуального рассмотрения ситуации."],
  ["Какие способы оплаты доступны?","На данный момент оплатить подписку можно банковской картой платежной системы «Мир» или через Систему быстрых платежей (СБП). В будущем список доступных способов оплаты может быть расширен."],
  ["Сохраняются ли мои сообщения?","Да. История ваших диалогов сохраняется в аккаунте, чтобы вы могли продолжить общение в любой момент с любого устройства. Все сообщения обрабатываются конфиденциально. Часть обезличенных данных может использоваться для улучшения качества работы искусственного интеллекта и повышения точности ответов."],
  ["Кто может видеть мои данные?","Ваши данные обрабатываются конфиденциально и используются исключительно в рамках работы сервиса. HarmonyAI не публикует ваши переписки и не предоставляет к ним открытый доступ. Мы уделяем большое внимание безопасности пользовательских данных."],
  ["Используются ли мои данные для улучшения искусственного интеллекта?","Да. Некоторые обезличенные данные могут использоваться для повышения качества ответов, исправления ошибок и дальнейшего развития HarmonyAI. Это помогает искусственному интеллекту становиться умнее и полезнее для всех пользователей."],
  ["Можно ли удалить историю чатов?","Да. Вы можете удалить историю своих диалогов. После удаления чаты больше не будут отображаться в вашем аккаунте. Некоторые технические данные могут временно храниться в соответствии с требованиями безопасности и действующей Политикой конфиденциальности."],
  ["Насколько безопасно пользоваться HarmonyAI?","Безопасность пользователей является одним из главных приоритетов проекта. Все данные обрабатываются конфиденциально, а передача информации осуществляется по защищенным соединениям. Мы рекомендуем не отправлять в чат банковские данные, пароли и другую особо важную личную информацию. Подробнее ознакомиться с обработкой данных можно в Политике конфиденциальности, которая доступна в настройках приложения."],
  ["Почему искусственный интелект может ошибаться?","HarmonyAI обучен на большом количестве данных, включая специализированные материалы по музыкальной грамоте, однако ни один искусственный интелект не может знать абсолютно все. Иногда модель может неправильно понять вопрос, использовать устаревшую информацию или сделать неверный вывод. Особенно это касается сложных или неоднозначных запросов. Если ответ кажется вам сомнительным, рекомендуем проверить информацию по дополнительным источникам или сообщить об ошибке через систему обратной связи. Ваши отзывы помогают сделать HarmonyAI лучше с каждым обновлением."],
  ["Что делать, если ответ оказался неправильным?","Если вы получили неверный ответ, поставьте ему дизлайк и, по возможности, укажите правильный вариант. Эта информация помогает улучшать качество работы искусственного интелекта. Если ошибка серьезная или повторяется несколько раз, вы также можете обратиться в службу поддержки, подробно описав ситуацию. Каждое сообщение рассматривается разработчиками."],
  ["Как сообщить об ошибке?","Сообщить об ошибке можно непосредственно в приложении или через официального Telegram-бота поддержки. При обращении желательно максимально подробно описать проблему и, если возможно, приложить скриншоты или пример запроса. Это поможет быстрее разобраться в ситуации и исправить ошибку."],
  ["Есть ли возрастные ограничения?","Пользоваться HarmonyAI можно с 10 лет. Если пользователю еще не исполнилось 18 лет, использование сервиса должно осуществляться с разрешения родителей или законных представителей. Это связано с требованиями пользовательского соглашения и правилами использования сервиса."],
  ["Почему HarmonyAI находится в стадии бета-тестирования?","HarmonyAI активно развивается, поэтому некоторые функции продолжают дорабатываться и совершенствоваться. Бета-тестирование позволяет быстрее находить ошибки, улучшать качество ответов и добавлять новые возможности. Чем больше пользователей пользуются сервисом и поддерживают его развитие, тем быстрее появляются новые функции и становится лучше качество работы искусственного интелекта."],
  ["На каких устройствах работает HarmonyAI?","HarmonyAI работает практически на любом современном устройстве. Вы можете пользоваться сервисом на смартфонах Android и iPhone, планшетах, компьютерах под управлением Windows, macOS и Linux. Для работы достаточно любого современного браузера и подключения к интернету. Установка дополнительных программ не требуется."],
  ["Есть ли мобильное приложение?","Пока нет. В настоящее время HarmonyAI работает как современное веб-приложение, которое полностью адаптировано под мобильные устройства. В будущем планируется выпуск полноценных приложений для Android и iOS с еще более удобным интерфейсом и дополнительными возможностями."],
  ["Работает ли HarmonyAI на iPhone и Android?","Да. HarmonyAI полностью поддерживает работу на устройствах под управлением iOS и Android. Благодаря адаптивному интерфейсу сервис одинаково удобно использовать как на смартфонах, так и на планшетах."],
  ["Какие браузеры поддерживаются?","HarmonyAI работает во всех современных браузерах, поддерживающих актуальные веб-стандарты. Если ваш браузер регулярно обновляется и поддерживает современные технологии, сервис будет работать корректно."],
  ["Требуется ли мощное устройство?","Нет. Все вычисления происходят на серверах HarmonyAI, поэтому высокая производительность устройства не требуется. Даже на относительно слабых смартфонах и компьютерах сервис работает стабильно при наличии стабильного интернет-соединения."],

  ["Можно ли использовать один аккаунт на нескольких устройствах?","Да. Один аккаунт можно использовать одновременно на нескольких устройствах. После входа по электронной почте вся история чатов, настройки и информация автоматически синхронизируются между устройствами, благодаря чему вы сможете продолжить работу с любого места."],

  ["Где можно следить за обновлениями?","В ближайшее время будет запущен официальный Telegram-канал HarmonyAI, где будут публиковаться новости проекта, информация о новых функциях, исправлениях ошибок и крупных обновлениях. Ссылка на канал появится после его открытия."],
  ["Когда новые функции становятся доступны пользователям?","Перед публикацией каждая новая функция проходит внутреннее тестирование разработчиками и модераторами. Это позволяет убедиться в ее стабильной работе и избежать появления серьезных ошибок. После успешного завершения тестирования функция становится доступна всем пользователям без необходимости устанавливать обновления."],
  ["Что делать, если HarmonyAI мне не понравился?","Нам очень жаль, если сервис не оправдал ваших ожиданий. HarmonyAI находится в активной стадии развития, поэтому мы постоянно работаем над исправлением ошибок, повышением качества ответов и добавлением новых функций. Если вы расскажете, что именно вас не устроило, мы обязательно рассмотрим ваше предложение и постараемся сделать сервис лучше."],
  ["Можно ли полностью доверять ответам HarmonyAI?","HarmonyAI является искусственным интелектом и, как любой современный искусственный интелект, иногда может допускать ошибки. Несмотря на специализированное обучение и большую базу знаний, мы рекомендуем перепроверять особенно важную информацию по официальным источникам, учебникам или консультироваться с преподавателем."],
  ["Есть ли возрастные ограничения для использования сервиса?","Самостоятельно использовать HarmonyAI рекомендуется с 18 лет. Пользователи младше 18 лет могут пользоваться сервисом только с разрешения родителей или законных представителей. Используя HarmonyAI, вы подтверждаете, что соблюдаете требования Пользовательского соглашения."],
  ["Можно ли использовать HarmonyAI в коммерческих целях?","На данный момент HarmonyAI разработан исключительно как образовательный сервис для учеников музыкальных школ. Использование платформы в коммерческих целях или для предоставления платных образовательных услуг без согласования с администрацией сервиса не предусмотрено."],
  ["Есть ли API для разработчиков?","Пока нет. В настоящее время HarmonyAI предназначен для использования через официальный сайт. Возможность предоставления API рассматривается, однако конкретные сроки его появления пока отсутствуют."],
  ["Как связаться со службой поддержки?","Связаться со службой поддержки можно по специальной ссылке, которая будет размещена в приложении и на официальном сайте HarmonyAI. При обращении рекомендуется подробно описать проблему и, при необходимости, приложить скриншоты или другие материалы, которые помогут быстрее разобраться в ситуации."],
  ["Где можно ознакомиться с Политикой конфиденциальности?","Политика конфиденциальности всегда доступна в настройках HarmonyAI. В ней подробно описано, какие данные собираются сервисом, каким образом они используются, как обеспечивается их защита и какие права имеют пользователи при работе с платформой."],
  ["Почему HarmonyAI может отвечать дольше обычного?","Время генерации ответа зависит от сложности запроса, выбранной модели, текущей нагрузки на серверы и используемых функций. Простые вопросы обычно обрабатываются за несколько секунд, а сложные запросы, анализ документов, генерация изображений или распознавание музыки могут потребовать немного больше времени."],
  ["Что делать, если сервис временно недоступен?","Иногда HarmonyAI может быть временно недоступен из-за технического обслуживания, обновления серверов или высокой нагрузки. В большинстве случаев работа восстанавливается автоматически в течение короткого времени. Если проблема сохраняется длительное время, рекомендуем обратиться в службу поддержки."],
  ["Как часто обновляется HarmonyAi?","HarmonyAI развивается постоянно. Исправления ошибок, улучшения моделей и новые функции публикуются регулярно после внутреннего тестирования. Мы стремимся делать сервис лучше с каждым обновлением, сохраняя стабильность и качество работы."]
];

/* ---- Render FAQ ---- */
var CHEV = '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>';
var faqList = document.getElementById("faqList");
FAQ.forEach(function(pair){
  var item = document.createElement("div");
  item.className = "item";
  item.setAttribute("data-q", pair[0].toLowerCase());
  var btn = document.createElement("button");
  btn.className = "q";
  btn.innerHTML = '<span>'+pair[0]+'</span>'+CHEV;
  var wrap = document.createElement("div");
  wrap.className = "a-wrap";
  wrap.innerHTML = '<div class="a-inner"><div class="a">'+pair[1]+'</div></div>';
  btn.addEventListener("click", function(){ item.classList.toggle("open"); });
  item.appendChild(btn);
  item.appendChild(wrap);
  faqList.appendChild(item);
});

/* ---- Search filter ---- */
var searchInput = document.getElementById("searchInput");
var emptyMsg = document.getElementById("emptyMsg");
searchInput.addEventListener("input", function(){
  var term = this.value.trim().toLowerCase();
  var shown = 0;
  document.querySelectorAll(".item").forEach(function(it){
    var match = it.getAttribute("data-q").indexOf(term) !== -1;
    it.classList.toggle("hidden", !match);
    if(match) shown++;
  });
  emptyMsg.classList.toggle("show", shown === 0);
});

/* ---- Language selector ---- */
var langBtn = document.getElementById("langBtn");
var langMenu = document.getElementById("langMenu");
var langLabel = document.getElementById("langLabel");
var siteTitle = document.getElementById("siteTitle");
var siteSub = document.getElementById("siteSub");

function applyLang(code){
  var t = I18N[code] || I18N.ru;
  langLabel.textContent = t.name;
  searchInput.placeholder = t.search;
  siteTitle.textContent = t.site;
  siteSub.textContent = t.sub;
  emptyMsg.textContent = t.empty;
  document.documentElement.lang = code;
  langMenu.querySelectorAll("button").forEach(function(b){
    b.setAttribute("aria-selected", b.getAttribute("data-code") === code ? "true" : "false");
  });
}

LANG_ORDER.forEach(function(code){
  var b = document.createElement("button");
  b.setAttribute("data-code", code);
  b.setAttribute("role", "menuitem");
  b.textContent = I18N[code].name;
  b.addEventListener("click", function(){
    applyLang(code);
    try{ localStorage.setItem("hai_lang", code); }catch(e){}
    closeMenu();
  });
  langMenu.appendChild(b);
});

function openMenu(){ langMenu.classList.add("open"); langBtn.setAttribute("aria-expanded","true"); }
function closeMenu(){ langMenu.classList.remove("open"); langBtn.setAttribute("aria-expanded","false"); }
langBtn.addEventListener("click", function(e){
  e.stopPropagation();
  langMenu.classList.contains("open") ? closeMenu() : openMenu();
});
document.addEventListener("click", function(e){
  if(!langMenu.contains(e.target) && e.target !== langBtn) closeMenu();
});

/* ---- Restore saved language ---- */
var saved = "ru";
try{ saved = localStorage.getItem("hai_lang") || "ru"; }catch(e){}
if(!I18N[saved]) saved = "ru";
applyLang(saved);
</script>
