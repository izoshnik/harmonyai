<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HarmonyAI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#08080f;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
.app{position:relative;z-index:2;width:100%;max-width:420px;min-height:100vh;display:flex;flex-direction:column;padding:20px 16px 32px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;}
.glass-btn{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:10px;}
.chat-area{flex:1;display:flex;flex-direction:column;gap:10px;padding:20px 0;overflow-y:auto;min-height:300px;}
.greeting{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 0;}
.greeting-text{font-size:28px;font-weight:900;color:#fff;line-height:1.25;text-align:center;}
.bottom{display:flex;flex-direction:column;gap:8px;margin-top:auto;}
.model-pill{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,0.13);border:1px solid rgba(255,255,255,0.28);border-radius:18px;padding:6px 12px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:600;color:white;align-self:flex-start;position:relative;}
.model-dot{width:6px;height:6px;border-radius:50%;background:#a8ff78;box-shadow:0 0 4px #a8ff78;flex-shrink:0;}
.input-glass{backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.28);border-radius:22px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.input-glass input{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:14px;color:white;}
.input-glass input::placeholder{color:rgba(255,255,255,0.4);}
.icon-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.send-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.bubble{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;}
.bubble.ai{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;align-self:flex-start;border-bottom-left-radius:4px;}
.bubble.user{background:#7c3aed;color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.dropdown{position:absolute;bottom:36px;left:0;width:200px;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);background:rgba(20,20,40,0.92);border:1px solid rgba(255,255,255,0.28);border-radius:16px;overflow:hidden;z-index:30;display:none;}
.dropdown.open{display:block;}
.d-option{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;font-weight:600;color:white;border-bottom:0.5px solid rgba(255,255,255,0.1);}
.d-option:last-child{border-bottom:none;}
.d-option:hover{background:rgba(255,255,255,0.1);}
.d-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.check{margin-left:auto;color:#a8ff78;}
.typing{display:flex;gap:4px;padding:10px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:16px;border-bottom-left-radius:4px;align-self:flex-start;}
.typing span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="app">
  <div class="top-bar">
    <div class="glass-btn">
      <svg width="16" height="12" fill="none"><rect width="16" height="1.8" rx=".9" fill="white"/><rect y="5" width="11" height="1.8" rx=".9" fill="white"/><rect y="10" width="16" height="1.8" rx=".9" fill="white"/></svg>
    </div>
    <div class="glass-btn" onclick="newChat()">
      <svg width="20" height="20" fill="none"><path d="M17 9C17 12.5 14.5 15.5 10.5 16.5L4 17.5L4.5 11.5C3.5 10.2 3 8.7 3 7C3 3.5 6 1 10 1C14 1 17 3.5 17 7" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="13" y1="11" x2="13" y2="15" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="13" x2="15" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
  </div>

  <div class="chat-area" id="chat">
    <div class="greeting"><div class="greeting-text">Привет!<br>Давай начнём,<br>отправь мне<br>сообщение<br>и я помогу!</div></div>
  </div>

  <div class="bottom">
    <div class="model-pill" id="pill" onclick="toggleDrop()">
      <div class="model-dot" id="dot"></div>
      <span id="mname">MusMind Lite</span>
      <span style="font-size:9px;opacity:.7">▼</span>
      <div class="dropdown" id="drop">
        <div class="d-option" onclick="selectM(event,'lite')">
          <div class="d-icon" style="background:rgba(168,255,120,0.2)">🌿</div>
          <div><div style="font-weight:700">MusMind Lite</div><div style="font-size:10px;opacity:.5">Быстро и легко</div></div>
          <span class="check" id="ck-lite">✓</span>
        </div>
        <div class="d-option" onclick="selectM(event,'pro')">
          <div class="d-icon" style="background:rgba(180,100,255,0.25)">✨</div>
          <div><div style="font-weight:700">MusMind Pro</div><div style="font-size:10px;opacity:.5">Максимум возможностей</div></div>
          <span class="check" id="ck-pro" style="opacity:0">✓</span>
        </div>
      </div>
    </div>

    <div class="input-glass">
      <div class="icon-btn" onclick="document.getElementById('fi').click()">
        <svg width="14" height="16" fill="none"><path d="M12 5.5L6 11.5C4.9 12.6 3.1 12.6 2 11.5C.9 10.4.9 8.6 2 7.5L8.5 1C9.3.2 10.6.2 11.4 1C12.2 1.8 12.2 3.1 11.4 3.9L5 10.3C4.6 10.7 3.9 10.7 3.5 10.3C3.1 9.9 3.1 9.2 3.5 8.8L9 3.3" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <input type="file" id="fi" accept="image/*" style="display:none" onchange="handleFile(this)">
      <input type="text" id="msg" placeholder="Спросить HarmonyAI..." onkeydown="if(event.key==='Enter')send()">
      <div class="send-btn" onclick="send()">
        <svg width="14" height="14" fill="none"><path d="M3 7H11M7.5 3.5L11 7L7.5 10.5" stroke="#222" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>
</div>

<script>
const API_KEY = 'AQ.Ab8RN6LjSFZsT2xp62rEIvybcBTe22ejJy4DpaIN5yAxnAsPGg';
const SYSTEM = `Ты HarmonyAI — музыкальный ИИ-помощник для учеников музыкальной школы. Ты отлично знаешь сольфеджио, музыкальную грамоту, ноты, интервалы, аккорды, лады, ритм, размеры, динамику, темп, музыкальные термины. Отвечай на русском языке. Будь дружелюбным и понятным для детей и подростков. Объясняй просто и с примерами.`;

let history = [];
let dropOpen = false;
let pendingImage = null;

// Фон
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize(); window.addEventListener('resize',resize);
const blobs=[
  {x:.2,y:.2,r:.3,c:[180,60,255],vx:.0008,vy:.0006},
  {x:.8,y:.3,r:.35,c:[255,80,120],vx:-.0007,vy:.001},
  {x:.5,y:.7,r:.4,c:[80,160,255],vx:.0006,vy:-.0009},
  {x:.2,y:.8,r:.28,c:[255,200,60],vx:.001,vy:-.0006},
  {x:.85,y:.75,r:.25,c:[60,230,180],vx:-.0009,vy:.0007},
];
function draw(){
  ctx.fillStyle='#08080f';ctx.fillRect(0,0,canvas.width,canvas.height);
  blobs.forEach(b=>{
    const x=b.x*canvas.width,y=b.y*canvas.height,r=b.r*Math.min(canvas.width,canvas.height);
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},0.55)`);
    g.addColorStop(1,`rgba(${b.c[0]},${b.c[1]},${b.c[2]},0)`);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<0||b.x>1)b.vx*=-1;
    if(b.y<0||b.y>1)b.vy*=-1;
  });
  requestAnimationFrame(draw);
}
draw();

function toggleDrop(){
  dropOpen=!dropOpen;
  document.getElementById('drop').classList.toggle('open',dropOpen);
}

function selectM(e,m){
  e.stopPropagation();
  document.getElementById('mname').textContent=m==='lite'?'MusMind Lite':'MusMind Pro';
  const dot=document.getElementById('dot');
  dot.style.background=m==='pro'?'#c084fc':'#a8ff78';
  dot.style.boxShadow=m==='pro'?'0 0 4px #c084fc':'0 0 4px #a8ff78';
  document.getElementById('ck-lite').style.opacity=m==='lite'?'1':'0';
  document.getElementById('ck-pro').style.opacity=m==='pro'?'1':'0';
  dropOpen=false;
  document.getElementById('drop').classList.remove('open');
}

document.addEventListener('click',function(e){
  if(dropOpen&&!e.target.closest('#pill')){
    dropOpen=false;
    document.getElementById('drop').classList.remove('open');
  }
});

function newChat(){
  history=[];
  document.getElementById('chat').innerHTML='<div class="greeting"><div class="greeting-text">Привет!<br>Давай начнём,<br>отправь мне<br>сообщение<br>и я помогу!</div></div>';
}

function addBubble(text,type){
  const chat=document.getElementById('chat');
  const g=chat.querySelector('.greeting');
  if(g)g.remove();
  const div=document.createElement('div');
  div.className='bubble '+type;
  div.textContent=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');
  div.className='typing';div.id='typing';
  div.innerHTML='<span></span><span></span><span></span>';
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function handleFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    pendingImage=e.target.result.split(',')[1];
    document.getElementById('msg').placeholder='Фото прикреплено — напиши вопрос...';
  };
  reader.readAsDataURL(file);
}

async function send(){
  const input=document.getElementById('msg');
  const text=input.value.trim();
  if(!text&&!pendingImage)return;
  input.value='';
  addBubble(text||(pendingImage?'[фото]':''),'user');

  const parts=[];
  if(pendingImage){
    parts.push({inline_data:{mime_type:'image/jpeg',data:pendingImage}});
    pendingImage=null;
    input.placeholder='Спросить HarmonyAI...';
  }
  if(text)parts.push({text:text});

  history.push({role:'user',parts:parts});
  showTyping();

  try{
    const messages=[
      {role:'user',parts:[{text:SYSTEM}]},
      {role:'model',parts:[{text:'Понял! Я HarmonyAI, готов помогать с музыкой.'}]},
      ...history
    ];

    const res=await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+API_KEY,
      {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:messages,
          generationConfig:{temperature:0.7,maxOutputTokens:1000}
        })
      }
    );
    const data=await res.json();
    if(data.error){
      hideTyping();
      addBubble('Ошибка API: '+data.error.message,'ai');
      return;
    }
    const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'Нет ответа';
    hideTyping();
    addBubble(reply,'ai');
    history.push({role:'model',parts:[{text:reply}]});
  }catch(e){
    hideTyping();
    addBubble('Ошибка соединения: '+e.message,'ai');
  }
}
</script>
</body>
</html>
