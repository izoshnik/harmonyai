<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HarmonyAI — Музыкальный ИИ-Помощник</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
}

:root {
  --bg-dark: #06060c;
  --text-main: #ffffff;
  --text-muted: rgba(255, 255, 255, 0.55);
  
  /* Эффект жидкого глянцевого стекла */
  --glass-bg: rgba(255, 255, 255, 0.05);
  --glass-bg-hover: rgba(255, 255, 255, 0.1);
  --glass-border: rgba(255, 255, 255, 0.18);
  --glass-border-glow: rgba(255, 255, 255, 0.35);
  --accent-glow: rgba(138, 92, 246, 0.4);
  --accent-color: #a78bfa;
}

body {
  background-color: var(--bg-dark);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* Эффектные глянцевые сферы на заднем плане */
.bg-glow-1 {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(124, 58, 237, 0.25) 0%, rgba(0,0,0,0) 70%);
  top: -10%;
  left: -10%;
  z-index: 0;
  pointer-events: none;
}
.bg-glow-2 {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(192, 132, 252, 0.18) 0%, rgba(0,0,0,0) 70%);
  bottom: -15%;
  right: -10%;
  z-index: 0;
  pointer-events: none;
}

/* Главный контейнер приложения */
.app-container {
  width: 100vw;
  height: 100vh;
  max-width: 480px;
  max-height: 900px;
  background: rgba(10, 10, 20, 0.4);
  border: 1px solid var(--glass-border);
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 
              inset 0 1px 2px rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(25px) saturate(160%);
  border-radius: 32px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  z-index: 1;
}

@media (max-width: 480px) {
  .app-container {
    max-width: 100%;
    max-height: 100%;
    border-radius: 0;
    border: none;
  }
}

/* Элементы Аутентификации */
.screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  opacity: 0;
  pointer-events: none;
  z-index: 1;
}

.screen.active {
  opacity: 1;
  pointer-events: auto;
  z-index: 2;
}

/* Экран Входа */
.auth-screen {
  justify-content: center;
  align-items: center;
  padding: 40px;
  text-align: center;
}

.brand-logo {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -1.5px;
  background: linear-gradient(135deg, #ffffff 30%, var(--accent-color) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.brand-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 48px;
}

.auth-card {
  width: 100%;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2);
  border-radius: 24px;
  padding: 28px 24px;
}

.input-group {
  margin-bottom: 16px;
  text-align: left;
}

.input-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 8px;
  padding-left: 4px;
}

.glass-input {
  width: 100%;
  background: rgba(0, 0, 0, 0.25);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 14px 16px;
  color: #fff;
  font-size: 15px;
  outline: none;
  transition: all 0.3s ease;
}

.glass-input:focus {
  border-color: var(--glass-border-glow);
  box-shadow: 0 0 15px var(--accent-glow);
}

.glass-btn {
  width: 100%;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.02) 100%);
  border: 1px solid var(--glass-border-glow);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 4px 15px rgba(0,0,0,0.2);
  color: #fff;
  padding: 14px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 8px;
}

.glass-btn:hover {
  background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.08) 100%);
  box-shadow: 0 0 20px rgba(167, 139, 250, 0.3);
}

/* Главный Интерфейс Чата */
.chat-header {
  height: 72px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--glass-border);
  background: rgba(15, 15, 30, 0.3);
  position: relative;
  z-index: 10;
}

.header-btn {
  width: 40px;
  height: 40px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #fff;
  transition: all 0.2s ease;
}

.header-btn:hover {
  background: var(--glass-bg-hover);
  border-color: var(--glass-border-glow);
}

/* Переключатель моделей (Капсула) */
.model-selector {
  display: flex;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid var(--glass-border);
  padding: 3px;
  border-radius: 20px;
  position: relative;
}

.model-option {
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 600;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  color: var(--text-muted);
}

.model-option.active {
  background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.04) 100%);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 2px 8px rgba(0,0,0,0.3);
}

/* Поле вывода сообщений */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.chat-messages::-webkit-scrollbar {
  width: 5px;
}
.chat-messages::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}

/* Стилизация Сообщений */
.message {
  max-width: 85%;
  font-size: 15px;
  line-height: 1.5;
  animation: fadeIn 0.3s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Сообщение Пользователя — Глянцевое облако */
.message.user {
  align-self: flex-end;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.03) 100%);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: inset 0 1px 0px rgba(255,255,255,0.2), 0 4px 12px rgba(0,0,0,0.15);
  padding: 12px 18px;
  border-radius: 18px 18px 4px 18px;
  color: #fff;
}

/* Сообщение ИИ — Чистый стелющийся текст без рамок */
.message.ai {
  align-self: flex-start;
  max-width: 100%;
  color: rgba(255, 255, 255, 0.95);
  padding: 4px 8px 4px 0px;
  border-radius: 0;
  background: none;
  box-shadow: none;
  border: none;
}

/* Индикатор печати ИИ */
.typing-indicator {
  display: flex;
  gap: 5px;
  padding: 8px 12px;
  align-self: flex-start;
}

.typing-dot {
  width: 7px;
  height: 7px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: wave 1.3s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: 0.15s; }
.typing-dot:nth-child(3) { animation-delay: 0.3s; }

@keyframes wave {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* Нижняя панель ввода */
.chat-input-area {
  padding: 16px 20px;
  background: rgba(10, 10, 20, 0.4);
  border-top: 1px solid var(--glass-border);
}

.input-container {
  display: flex;
  align-items: center;
  background: rgba(0, 0, 0, 0.35);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 6px 6px 6px 14px;
  transition: all 0.3s ease;
}

.input-container:focus-within {
  border-color: var(--glass-border-glow);
  box-shadow: 0 0 15px var(--accent-glow);
}

.chat-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: #fff;
  font-size: 15px;
  padding: 8px 0;
  resize: none;
  max-height: 100px;
}

.send-btn {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
  border: 1px solid var(--glass-border-glow);
  border-radius: 14px;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
}

.send-btn:hover {
  background: #fff;
  color: var(--bg-dark);
}

/* Боковая панель истории (Сайдбар) */
.sidebar {
  position: absolute;
  top: 0;
  left: 0;
  width: 280px;
  height: 100%;
  background: rgba(8, 8, 16, 0.94);
  backdrop-filter: blur(30px);
  border-right: 1px solid var(--glass-border);
  z-index: 100;
  transform: translateX(-100%);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
}

.sidebar.open {
  transform: translateX(0);
}

.sidebar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.sidebar-title {
  font-size: 18px;
  font-weight: 700;
}

.history-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.history-item {
  padding: 12px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255,255,255,0.05);
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all 0.2s ease;
}

.history-item:hover {
  background: var(--glass-bg-hover);
  border-color: var(--glass-border);
}

.sidebar-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.4);
  z-index: 99;
  display: none;
}

.sidebar-overlay.active {
  display: block;
}

.status-msg {
  font-size: 13px;
  margin-top: 10px;
  color: #ff6b6b;
}
.status-msg.success {
  color: #51cf66;
}
</style>
</head>
<body>

<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="app-container">
  
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">История чатов</div>
      <div class="header-btn" id="closeMenuBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </div>
    </div>
    <div class="history-list" id="historyList">
      </div>
    <button class="glass-btn" style="margin-top:auto;" id="logoutBtn">Выйти из аккаунта</button>
  </div>

  <div class="screen auth-screen active" id="authScreen">
    <div class="brand-logo">HarmonyAI</div>
    <div class="brand-subtitle">ИИ-помощник по музыкальной теории</div>
    
    <div class="auth-card" id="emailCard">
      <div class="input-group">
        <label>Электронная почта</label>
        <input type="email" id="emailInput" class="glass-input" placeholder="name@example.com">
      </div>
      <button class="glass-btn" id="sendOtpBtn">Получить код входа</button>
      <div class="status-msg" id="authError"></div>
    </div>

    <div class="auth-card" id="otpCard" style="display: none;">
      <div class="input-group">
        <label>Код подтверждения</label>
        <input type="text" id="otpInput" class="glass-input" placeholder="123456">
      </div>
      <button class="glass-btn" id="verifyOtpBtn">Войти в приложение</button>
      <button class="glass-btn" id="backToEmailBtn" style="background:none; border:none; box-shadow:none; font-size:13px; color:var(--text-muted);">Изменить email</button>
    </div>
  </div>

  <div class="screen" id="chatScreen">
    <div class="chat-header">
      <div class="header-btn" id="openMenuBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </div>
      
      <div class="model-selector">
        <div class="model-option active" data-model="lite" id="modelLite">Lite</div>
        <div class="model-option" data-model="pro" id="modelPro">Pro</div>
      </div>

      <div class="header-btn" id="newChatBtn" title="Новый чат">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message ai">Привет! Я твой музыкальный ассистент HarmonyAI. Чем тебе помочь сегодня? Задай вопрос по сольфеджио или теории музыки.</div>
    </div>

    <div class="chat-input-area">
      <div class="input-container">
        <textarea id="msgInput" class="chat-input" rows="1" placeholder="Спросить HarmonyAI..."></textarea>
        <div class="send-btn" id="sendMsgBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ИНИЦИАЛИЗАЦИЯ SUPABASE (Вставьте ваши реальные данные)
const SUPABASE_URL = 'https://YOUR_SUPABASE_PROJECT.supabase.co'; 
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
const supabase = (typeof SUPABASE_URL !== 'undefined' && !SUPABASE_URL.includes('YOUR_')) ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

// Переменные состояния
let currentSession = null;
let currentChatHistory = [];
let selectedModel = 'lite';

// DOM-Элементы
const authScreen = document.getElementById('authScreen');
const chatScreen = document.getElementById('chatScreen');
const emailCard = document.getElementById('emailCard');
const otpCard = document.getElementById('otpCard');
const emailInput = document.getElementById('emailInput');
const otpInput = document.getElementById('otpInput');
const authError = document.getElementById('authError');
const chatMessages = document.getElementById('chatMessages');
const msgInput = document.getElementById('msgInput');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');

// Автоматическое расширение textarea при вводе текста
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = (this.scrollHeight - 10) + 'px';
});

/* ================= СЕРВИСНЫЕ ФУНКЦИИ UI ================= */
function switchScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

// Управление сайдбаром (Три полоски)
function toggleSidebar(open) {
  if (open) {
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('active');
  } else {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('active');
  }
}

document.getElementById('openMenuBtn').addEventListener('click', () => toggleSidebar(true));
document.getElementById('closeMenuBtn').addEventListener('click', () => toggleSidebar(false));
sidebarOverlay.addEventListener('click', () => toggleSidebar(false));

// Переключение моделей (Визуальный глянец)
const modelLite = document.getElementById('modelLite');
const modelPro = document.getElementById('modelPro');

modelLite.addEventListener('click', () => {
  modelLite.classList.add('active');
  modelPro.classList.remove('active');
  selectedModel = 'lite';
});

modelPro.addEventListener('click', () => {
  modelPro.classList.add('active');
  modelLite.classList.remove('active');
  selectedModel = 'pro';
});

/* ================= ЛОГИКА АВТОРИЗАЦИИ ================= */
if (supabase) {
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) handleAuthSuccess(session);
  });
} else {
  // Демо-режим, если Supabase еще не подключен
  console.log("HarmonyAI запущен в режиме демонстрации (без Supabase конфигурации).");
  setTimeout(() => { switchScreen('chatScreen'); }, 1500);
}

document.getElementById('sendOtpBtn').addEventListener('click', async () => {
  const email = emailInput.value.trim();
  if (!email) return showAuthError("Введите корректный email");
  
  authError.textContent = "";
  if (!supabase) { // Обертка для теста
    emailCard.style.display = 'none';
    otpCard.style.display = 'block';
    return;
  }

  const { error } = await supabase.auth.signInWithOtp({ email });
  if (error) {
    showAuthError(`Ошибка: ${error.message}. Проверьте лимиты писем или отключите Confirm Email в Supabase.`);
  } else {
    emailCard.style.display = 'none';
    otpCard.style.display = 'block';
  }
});

document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
  const email = emailInput.value.trim();
  const token = otpInput.value.trim();
  if (!token) return showAuthError("Введите код подтверждения");

  if (!supabase) {
    switchScreen('chatScreen');
    return;
  }

  const { data: { session }, error } = await supabase.auth.verifyOtp({ email, token, type: 'email' });
  if (error) {
    showAuthError(`Неверный код: ${error.message}`);
  } else if (session) {
    handleAuthSuccess(session);
  }
});

document.getElementById('backToEmailBtn').addEventListener('click', () => {
  otpCard.style.display = 'none';
  emailCard.style.display = 'block';
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  if (supabase) await supabase.auth.signOut();
  window.location.reload();
});

function showAuthError(msg) {
  authError.textContent = msg;
}

function handleAuthSuccess(session) {
  currentSession = session;
  switchScreen('chatScreen');
  loadUserChats();
}

/* ================= РАБОТА С ЧАТОМ И ОТПРАВКОЙ ================= */

// Добавление сообщения на экран
function appendMessage(text, role) {
  const msgDiv = document.createElement('div');
  msgDiv.classList.add('message', role);
  msgDiv.innerHTML = text.replace(/\n/g, '<br>');
  chatMessages.appendChild(msgDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return msgDiv;
}

// Индикатор ожидания ответа
let typingIndicatorElement = null;
function showTyping() {
  if (typingIndicatorElement) return;
  typingIndicatorElement = document.createElement('div');
  typingIndicatorElement.classList.add('typing-indicator');
  typingIndicatorElement.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  chatMessages.appendChild(typingIndicatorElement);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function hideTyping() {
  if (typingIndicatorElement) {
    typingIndicatorElement.remove();
    typingIndicatorElement = null;
  }
}

// Главная функция отправки сообщения
async function handleSendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;

  // Очищаем инпут сразу
  msgInput.value = '';
  msgInput.style.height = 'auto';

  // Выводим сообщение пользователя (в красивом глянцевом облачке)
  appendMessage(text, 'user');
  currentChatHistory.push({ role: 'user', content: text });

  // Включаем эффект ожидания ИИ
  showTyping();

  try {
    // Делаем запрос к вашему API-эндпоинту чата (например Vercel Serverless /api/chat)
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: selectedModel,
        messages: currentChatHistory
      })
    });

    const data = await response.json();
    hideTyping();

    if (data.error) {
      appendMessage(`Ошибка обработки: ${data.error.message || JSON.stringify(data.error)}`, 'ai');
    } else {
      const reply = data.choices?.[0]?.message?.content || 'Извини, не удалось сформулировать ответ.';
      // Стелющийся текст ответа ИИ
      appendMessage(reply, 'ai');
      currentChatHistory.push({ role: 'assistant', content: reply });
      saveChatToSupabase();
    }
  } catch (err) {
    hideTyping();
    // Локальный фолбек-ответ, если API еще не развернуто на Vercel
    setTimeout(() => {
      appendMessage(`Интеграция активна. Вы выбрали модель [${selectedModel.toUpperCase()}]. Для полноценных ответов завершите деплой функции /api/chat на Vercel с вашим GEMINI_API_KEY.`, 'ai');
    }, 600);
  }
}
